<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="uma adicionador de tempo pra horario, de tantos em tanto eu consigo saber quanto vira quanto, so que de hora"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Adicionador de Tempo</title>
  </head>
  <body>
    <h1 id="tituloHoraInicial" class="mainText">HORA INICIAL:</h1>
    <label>defina a hora e minutos que vai comecar:</label>
    <input type="text" id="tempoInicial" />
    <button type="button" id="botaoInicial" class="botao">Adicionar</button
    ><br /><br /><br /><br />

    <h1 id="tituloHoraFinal" class="mainText">HORA FINAL:</h1>
    <label>horas e minutos que vao ser adicionados</label>
    <input type="text" id="tempoAdicional" />
    <button type="button" id="botaoAdicional" class="botao">Adicionar</button>

    <script src="index.js"></script>
  </body>
</html>
